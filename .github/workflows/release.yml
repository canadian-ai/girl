name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  CGO_ENABLED: "1"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./... -count=1

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Build girl
        run: go build -o girl ./cmd/girl/

      - name: Validate examples
        run: |
          ./girl validate examples/grp/minimal-plan.json
          ./girl validate examples/grp/go-plan.json
          ./girl validate examples/grp/react-plan.json

      - name: Compute checksum
        run: sha256sum girl > girl.sha256

      - name: Build Docker image
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          REPO="ghcr.io/${{ github.repository }}"
          cat > Dockerfile.release << 'DOCKEREOF'
          FROM alpine:3.21
          RUN apk add --no-cache ca-certificates
          COPY girl /usr/local/bin/girl
          ENTRYPOINT ["/usr/local/bin/girl"]
          DOCKEREOF
          docker build -f Dockerfile.release -t "${REPO}:${TAG}" -t "${REPO}:latest" .

      - name: Push Docker image to ghcr.io
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push --all-tags "ghcr.io/${{ github.repository }}"

      - name: Make package public
        run: |
          PACKAGE_NAME="${GITHUB_REPOSITORY#canadian-ai/}"
          gh api --method PATCH "/user/packages/container/${PACKAGE_NAME}/visibility" \
            -f visibility="public" || true

      - name: Create Release via gh
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          NOTES=$(cat <<-EOF
          # GIRL ${TAG}

          **Grammar-Informed Refactoring Language** for AI coding agents.

          ### Linux (amd64)
          \`\`\`
          curl -LO https://github.com/canadian-ai/girl/releases/download/${TAG}/girl
          chmod +x girl
          sudo mv girl /usr/local/bin/
          \`\`\`

          ### Build from source
          \`\`\`
          go install github.com/canadian-ai/girl/cmd/girl@${TAG}
          \`\`\`

          Requires Go 1.25+ and a C compiler (for tree-sitter).

          ### Checksums
          \`\`\`
          $(cat girl.sha256)
          \`\`\`

          See [CHANGELOG.md](https://github.com/canadian-ai/girl/blob/master/CHANGELOG.md) for full release notes.
          EOF
          )
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes "${NOTES}" \
            girl girl.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
