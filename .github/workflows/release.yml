name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CGO_ENABLED: "1"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./... -count=1

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build girl
        run: go build -o girl ./cmd/girl/

      - name: Validate examples
        run: |
          ./girl validate examples/grp/minimal-plan.json
          ./girl validate examples/grp/go-plan.json
          ./girl validate examples/grp/react-plan.json

      - name: Compute checksum
        run: sha256sum girl > girl.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: .github/release-template.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            girl
            girl.sha256
