name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest_tag
        run: echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo 'v0.0.0')" >> "$GITHUB_OUTPUT"

      - name: Determine bump type
        id: bump_type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.bump }}" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        id: bump
        run: |
          TAG="${{ steps.latest_tag.outputs.tag }}"
          MAJOR=$(echo "$TAG" | sed 's/^v//' | cut -d. -f1)
          MINOR=$(echo "$TAG" | cut -d. -f2)
          PATCH=$(echo "$TAG" | cut -d. -f3)
          BUMP="${{ steps.bump_type.outputs.type }}"
          case $BUMP in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac
          echo "new_tag=v$MAJOR.$MINOR.$PATCH" >> "$GITHUB_OUTPUT"
          echo "new_version=$MAJOR.$MINOR.$PATCH" >> "$GITHUB_OUTPUT"

      - name: Update version in source
        run: |
          sed -i "s/Version    = \".*\"/Version    = \"${{ steps.bump.outputs.new_version }}\"/" internal/commands/version.go
          sed -i "s/Version:     \".*\"/Version:     \"${{ steps.bump.outputs.new_version }}\"/" cmd/girl/main.go

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add internal/commands/version.go cmd/girl/main.go
          NEW_TAG="${{ steps.bump.outputs.new_tag }}"
          if git diff --cached --quiet; then
            echo "No version change needed"
          else
            git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
            git push
          fi
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true

      - name: Build binary
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          BUILT_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          go build -ldflags="-X 'github.com/canadian-ai/girl/internal/commands.Commit=$COMMIT' -X 'github.com/canadian-ai/girl/internal/commands.BuiltAt=$BUILT_AT'" -o girl ./cmd/girl/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.new_tag }}
          name: ${{ steps.bump.outputs.new_tag }}
          files: girl
          generate_release_notes: true
          fail_on_unmatched_files: false
