name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true

      - name: Build
        run: go build -o girl ./cmd/girl/

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v -count=1

      - name: Smoke test (Go)
        run: |
          ./girl analyze examples/real-refactors/go-before --output text
          ./girl plan examples/real-refactors/go-before --output grp-json
          ./girl validate examples/real-refactors/go-before/.grp/plan.json || true
          ./girl pack examples/real-refactors/go-before --budget 4000 --output json

      - name: Smoke test (React)
        run: |
          ./girl analyze examples/messy-react-form --output text
          ./girl plan examples/messy-react-form --output grp-json
          ./girl validate examples/messy-react-form/.grp/plan.json || true

      - name: Verify examples
        run: |
          ./girl verify examples/messy-react-form --output text
