name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CGO_ENABLED: "1"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        run: go build -o girl ./cmd/girl/
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./... -count=1
      - name: Validate examples
        run: |
          ./girl validate examples/grp/minimal-plan.json
          ./girl validate examples/grp/go-plan.json
          ./girl validate examples/grp/react-plan.json
